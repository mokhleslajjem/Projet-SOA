syntax = "proto3";

package user;

service UserService {
  rpc Register (RegisterRequest) returns (UserResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc GetUser (GetUserRequest) returns (UserResponse);
  rpc ListUsers (Empty) returns (UserList);
}

message Empty {}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  string role = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message GetUserRequest {
  string id = 1;
}

message UserResponse {
  string id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
  string created_at = 5;
  string status = 6;
  string error = 7;
}

message LoginResponse {
  string token = 1;
  string user_id = 2;
  string name = 3;
  string email = 4;
  string role = 5;
  string status = 6;
  string error = 7;
}

message UserList {
  repeated UserResponse users = 1;
  string status = 2;
}