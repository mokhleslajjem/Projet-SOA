syntax = "proto3";

package course;

service CourseService {
  rpc CreateCourse (CreateCourseRequest) returns (CourseResponse);
  rpc GetCourse (GetCourseRequest) returns (CourseResponse);
  rpc ListCourses (Empty) returns (CourseList);
  rpc UpdateCourse (UpdateCourseRequest) returns (CourseResponse);
  rpc DeleteCourse (DeleteCourseRequest) returns (StatusResponse);
  rpc EnrollUser (EnrollRequest) returns (EnrollResponse);
  rpc GetEnrollments (GetEnrollmentsRequest) returns (EnrollmentList);
}

message Empty {}

message CreateCourseRequest {
  string title = 1;
  string description = 2;
  string instructor = 3;
  float price = 4;
  string category = 5;
  string level = 6;
}

message UpdateCourseRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  float price = 4;
  string category = 5;
  string level = 6;
}

message DeleteCourseRequest {
  string id = 1;
}

message GetCourseRequest {
  string id = 1;
}

message EnrollRequest {
  string user_id = 1;
  string course_id = 2;
}

message GetEnrollmentsRequest {
  string user_id = 1;
}

message CourseResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string instructor = 4;
  float price = 5;
  string category = 6;
  string level = 7;
  string created_at = 8;
  string status = 9;
  string error = 10;
}

message CourseList {
  repeated CourseResponse courses = 1;
  string status = 2;
}

message EnrollResponse {
  string id = 1;
  string user_id = 2;
  string course_id = 3;
  string enrolled_at = 4;
  string status = 5;
  string error = 6;
}

message EnrollmentList {
  repeated EnrollResponse enrollments = 1;
  string status = 2;
}

message StatusResponse {
  string status = 1;
  string message = 2;
}